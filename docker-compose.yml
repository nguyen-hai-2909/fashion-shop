name: fashion
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/test", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./fashion-spring-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/fashion_shop
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-change-me-in-production}
      URL_CLIENT: ${URL_CLIENT:-http://localhost:3000}
      URL_CLIENT_RESET_PASS: ${URL_CLIENT_RESET_PASS:-http://localhost:3000/reset-password}
      APP_UPLOAD_DIR: /data/photos
      CLOUDINARY_URL: ${CLOUDINARY_URL:-cloudinary://187942586943911:Vp8vws1XqdQqxSEjYgT2SJ-X248@dxommhmg8}
    volumes:
      - backend_photos:/data/photos
      - backend_imgs:/data/imgs
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./fashion-react-frontend-main
      args:
        VITE_BASE_URL: /api/v1/
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  backend_photos:
  backend_imgs:
