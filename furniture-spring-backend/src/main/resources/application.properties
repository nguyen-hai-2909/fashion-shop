server.port=8080

spring.application.name=fashion-api

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/fashion_shop}

# Match Node jsonwebtoken HS256 secret
app.jwt.secret=${ACCESS_TOKEN_SECRET:change-me-in-production}
app.jwt.expiration-hours=8

app.url.client=${URL_CLIENT:http://localhost:3000}
app.url.reset-password=${URL_CLIENT_RESET_PASS:http://localhost:3000/reset-password}

# Optional mail (forgot password / discount email)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${USER_EMAIL:}
spring.mail.password=${PASSWORD_EMAIL:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# VNPay (same env names as Node)
vnpay.tmn-code=${VNP_TMNCODE:}
vnpay.hash-secret=${VNP_HASHSECRET:}
vnpay.pay-url=${VNP_URL:}
vnpay.return-url=${VNP_RETURNURL:}

# Local uploads (served at /photos/**)
app.upload.dir=${APP_UPLOAD_DIR:./uploads}

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
